<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мой летний гардероб</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #F5F0E8;
    --sand-dark: #EDE5D4;
    --clay: #C9A87C;
    --clay-dark: #A8845A;
    --ink: #1C1814;
    --ink-light: #4A4035;
    --mist: #8C8070;
    --white: #FDFAF5;
    --accent: #D4694A;
    --accent-light: #F0C5B8;
    --sea: #4A8FA3;
    --sea-light: #C2DDE6;
    --border: rgba(28,24,20,0.12);
    --border-strong: rgba(28,24,20,0.25);
    --radius: 4px;
    --radius-lg: 10px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --shadow: 0 2px 12px rgba(28,24,20,0.08);
    --shadow-lg: 0 8px 32px rgba(28,24,20,0.14);
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font-body);
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 300;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(212,105,74,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 10% 80%, rgba(74,143,163,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(245,240,232,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.5rem; font-weight: 400; font-style: italic;
    color: var(--ink); letter-spacing: 0.01em;
    text-decoration: none;
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn-sm {
    font-family: var(--font-body); font-size: 12px; font-weight: 400;
    padding: 7px 16px; border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: transparent; color: var(--ink-light);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn-sm:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .btn-sm.accent { background: var(--accent); color: var(--white); border-color: var(--accent); }
  .btn-sm.accent:hover { background: var(--clay-dark); border-color: var(--clay-dark); }

  /* ─── MAIN LAYOUT ─── */
  .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  /* ─── HERO ─── */
  .hero { margin-bottom: 2.5rem; }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 300; line-height: 1.1;
    color: var(--ink); margin-bottom: 0.5rem;
  }
  .hero-title em { color: var(--accent); font-style: italic; }
  .hero-sub { font-size: 14px; color: var(--mist); letter-spacing: 0.03em; }

  /* ─── TABS ─── */
  .tabs-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2rem; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab {
    font-family: var(--font-body); font-size: 13px; font-weight: 400;
    padding: 10px 20px 12px;
    border: none; background: transparent;
    color: var(--mist); cursor: pointer;
    position: relative; transition: color 0.2s;
    letter-spacing: 0.03em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--sand-dark); color: var(--mist);
    font-size: 10px; margin-left: 6px; vertical-align: middle;
  }
  .tab.active .tab-count { background: var(--accent-light); color: var(--accent); }
  .tab-add {
    font-size: 12px; color: var(--mist); padding: 10px 14px 12px;
    border: none; background: transparent; cursor: pointer;
    transition: color 0.2s; margin-bottom: -1px;
  }
  .tab-add:hover { color: var(--ink); }

  /* ─── SECTION ─── */
  .section { display: none; }
  .section.active { display: block; }

  .section-header { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .pill-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
  }
  .pill-input-wrap svg { width: 14px; height: 14px; stroke: var(--mist); flex-shrink: 0; }
  .pill-input {
    border: none; background: transparent; font-family: var(--font-body);
    font-size: 12px; color: var(--ink); outline: none; width: 90px;
  }
  .pill-input::placeholder { color: var(--mist); }

  /* ─── GRID ─── */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 2rem;
  }

  .item-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all 0.25s;
    position: relative;
    cursor: pointer;
  }
  .item-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    border-color: var(--border-strong);
  }
  .item-card:hover .card-overlay { opacity: 1; }

  .card-img {
    aspect-ratio: 3/4; overflow: hidden;
    background: var(--sand-dark);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--mist);
  }
  .card-img-placeholder svg { width: 32px; height: 32px; stroke: var(--clay); opacity: 0.5; }
  .card-img-placeholder span { font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }

  .card-overlay {
    position: absolute; inset: 0;
    background: rgba(28,24,20,0.4);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    opacity: 0; transition: opacity 0.2s;
  }
  .card-overlay-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--white); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .card-overlay-btn:hover { background: var(--sand); }
  .card-overlay-btn svg { width: 15px; height: 15px; stroke: var(--ink); }
  .card-overlay-btn.danger:hover { background: #fee; }
  .card-overlay-btn.danger:hover svg { stroke: var(--accent); }

  .card-info { padding: 10px 12px 12px; }
  .card-name {
    font-size: 13px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .card-shop { font-size: 11px; color: var(--mist); margin-bottom: 2px; }
  .card-price { font-size: 12px; color: var(--clay-dark); font-weight: 500; }
  .card-shop-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  .card-link-icon {
    position: absolute; top: 8px; left: 8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(245,240,232,0.9);
    display: flex; align-items: center; justify-content: center;
  }
  .card-link-icon svg { width: 10px; height: 10px; stroke: var(--clay-dark); }

  /* ─── ADD CARD ─── */
  .add-card {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    aspect-ratio: 3/4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; color: var(--mist);
    transition: all 0.2s; background: transparent;
    font-family: var(--font-body); font-size: 12px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .add-card svg { width: 28px; height: 28px; stroke: var(--clay); opacity: 0.6; }
  .add-card:hover { background: var(--white); border-color: var(--clay); color: var(--clay-dark); }
  .add-card:hover svg { opacity: 1; }

  /* ─── BOTTOM SECTION ─── */
  .bottom-row { display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; align-items: start; }
  @media (max-width: 600px) { .bottom-row { grid-template-columns: 1fr; } }

  .notes-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mist); margin-bottom: 8px; }
  .notes-area {
    width: 100%; border: 1px solid var(--border);
    border-radius: var(--radius-lg); background: var(--white);
    color: var(--ink); font-family: var(--font-body); font-size: 13px;
    padding: 12px 14px; line-height: 1.7; resize: vertical;
    outline: none; min-height: 90px; transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--clay); }
  .notes-area::placeholder { color: var(--mist); }

  /* ─── PALETTE ─── */
  .palette-wrap { min-width: 200px; }
  .palette-dots { display: flex; flex-wrap: wrap; gap: 8px; max-width: 220px; }
  .palette-dot {
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .palette-dot:hover { transform: scale(1.12); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .palette-dot.added { border-color: var(--ink); }
  .palette-dot.ghost { opacity: 0.3; }
  .palette-dot.ghost:hover { opacity: 0.7; }
  .palette-dot .dot-remove {
    position: absolute; inset: -4px;
    display: none; align-items: center; justify-content: center;
    background: rgba(28,24,20,0.5); border-radius: 50%; color: white;
    font-size: 14px; font-weight: 300;
  }
  .palette-dot.added:hover .dot-remove { display: flex; }

  /* ─── SUMMARY BAR ─── */
  .summary-bar {
    display: flex; gap: 1.5rem; margin-top: 1.5rem;
    padding: 14px 20px; background: var(--white);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    flex-wrap: wrap; align-items: center;
  }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mist); }
  .summary-val { font-size: 16px; font-weight: 500; color: var(--ink); font-family: var(--font-display); }
  .summary-divider { width: 1px; height: 30px; background: var(--border); }

  /* ─── MODAL ─── */
  .modal-bg {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(28,24,20,0.45); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 16px;
    padding: 2rem; width: min(480px, 100%);
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title {
    font-family: var(--font-display); font-size: 1.6rem;
    font-weight: 400; font-style: italic; margin-bottom: 1.5rem; color: var(--ink);
  }
  .form-row { margin-bottom: 1rem; }
  .form-label {
    display: block; font-size: 11px; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--mist); margin-bottom: 6px;
  }
  .form-input, .form-select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--sand); color: var(--ink);
    font-family: var(--font-body); font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--clay); }
  .form-input::placeholder { color: var(--mist); }
  .form-select { appearance: none; cursor: pointer; }

  .drop-zone {
    border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg);
    padding: 24px; text-align: center; cursor: pointer;
    color: var(--mist); font-size: 12px; transition: all 0.2s;
    background: var(--sand);
  }
  .drop-zone:hover, .drop-zone.over { border-color: var(--clay); background: var(--sand-dark); color: var(--clay-dark); }
  .drop-zone svg { width: 28px; height: 28px; stroke: var(--clay); display: block; margin: 0 auto 8px; opacity: 0.6; }
  .drop-zone.has-img { border-color: var(--sea); background: var(--sea-light); color: var(--sea); }
  .drop-zone.has-img svg { stroke: var(--sea); opacity: 1; }
  .drop-zone-preview { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; display: block; margin: 0 auto 8px; }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel {
    font-family: var(--font-body); font-size: 13px; padding: 10px 20px;
    border-radius: 20px; border: 1px solid var(--border-strong);
    background: transparent; color: var(--mist); cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { background: var(--sand-dark); color: var(--ink); }
  .btn-save {
    font-family: var(--font-body); font-size: 13px; padding: 10px 24px;
    border-radius: 20px; border: none;
    background: var(--ink); color: var(--white); cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { background: var(--accent); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
    background: var(--ink); color: var(--white);
    padding: 12px 20px; border-radius: 20px;
    font-size: 13px; font-family: var(--font-body);
    transform: translateY(10px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--mist);
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--clay); opacity: 0.4; display: block; margin: 0 auto 1rem; }
  .empty-state h3 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; font-style: italic; margin-bottom: 0.5rem; color: var(--ink-light); }
  .empty-state p { font-size: 13px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .app { padding: 1.5rem 1rem 4rem; }
    .hero-title { font-size: 2rem; }
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">летний<span> гардероб</span></a>
  <div class="header-actions">
    <button class="btn-sm" id="exportBtn">Экспорт JSON</button>
    <button class="btn-sm accent" id="addItemBtn">+ Добавить вещь</button>
  </div>
</header>

<main class="app">
  <div class="hero">
    <h1 class="hero-title">Мой <em>летний</em> гардероб</h1>
    <p class="hero-sub">собирай аутфиты · сохраняй находки с маркетплейсов · планируй образы</p>
  </div>

  <div class="tabs-row" id="tabsRow">
    <!-- tabs injected by JS -->
    <button class="tab-add" id="addTabBtn" title="Новый раздел">+ раздел</button>
  </div>

  <div id="sectionsContainer"></div>
</main>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 class="modal-title" id="modalTitle">Добавить вещь</h2>

    <div class="form-row">
      <label class="form-label">Название</label>
      <input class="form-input" id="mName" placeholder="Льняное платье миди" />
    </div>
    <div class="form-row">
      <label class="form-label">Магазин</label>
      <select class="form-select" id="mShop">
        <option value="">— выбрать —</option>
        <option>Wildberries</option>
        <option>Ozon</option>
        <option>Lamoda</option>
        <option>Zara</option>
        <option>H&M</option>
        <option>ASOS</option>
        <option>Shein</option>
        <option>12 Storeez</option>
        <option>Befree</option>
        <option>Love Republic</option>
        <option>Другое</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Ссылка на товар</label>
      <input class="form-input" id="mUrl" placeholder="https://..." />
    </div>
    <div class="form-row">
      <label class="form-label">Цена</label>
      <input class="form-input" id="mPrice" placeholder="3 490 ₽" style="width:160px" />
    </div>
    <div class="form-row">
      <label class="form-label">Фото</label>
      <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Перетащи скриншот или кликни для выбора
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
      <input class="form-input" id="mImgUrl" placeholder="или вставь ссылку на фото..." style="margin-top:8px;" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">Отмена</button>
      <button class="btn-save" id="modalSave">Добавить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHOP_COLORS = {
  'Wildberries':'#CB11AB','Ozon':'#005BFF','Lamoda':'#1A1A1A',
  'Zara':'#333','H&M':'#E50010','ASOS':'#2D3B8E','Shein':'#000',
  '12 Storeez':'#7C6F5B','Befree':'#E8633B','Love Republic':'#C03267','Другое':'#8C8070'
};
const PALETTE_COLORS = [
  '#F9E4D4','#F5C6A0','#E8A87C','#D4694A','#B5432A',
  '#F9F3E4','#E8DDB8','#C9A87C','#A8845A','#7A5C35',
  '#E4EDF9','#A8C8E8','#4A8FA3','#2A6A80','#1A4A5A',
  '#E4F9E8','#A8DFB8','#5AAA7A','#2A7A4A','#1A5A2A',
  '#F9E4EF','#E8A8C8','#C84A8A','#1C1814','#FDFAF5'
];

const STORAGE_KEY = 'wardrobe_v2';

let state = {
  outfits: [
    { id: 1, name: 'Пляж', items: [], notes: '', palette: [], occasion: 'пляж', mood: '' },
    { id: 2, name: 'Вечер', items: [], notes: '', palette: [], occasion: 'ресторан', mood: '' },
    { id: 3, name: 'Прогулки', items: [], notes: '', palette: [], occasion: 'прогулка', mood: '' },
  ],
  activeId: 1,
  nextId: 4,
};

function load() {
  try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (s) state = s; } catch(e) {}
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

load();

// ─── MODAL STATE ───
let modal = { outfitId: null, itemIdx: null, tempImg: null };

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── RENDER ───
function render() {
  renderTabs();
  renderSection();
  save();
}

function renderTabs() {
  const row = document.getElementById('tabsRow');
  const addBtn = document.getElementById('addTabBtn');
  row.querySelectorAll('.tab').forEach(t => t.remove());
  state.outfits.forEach(o => {
    const t = document.createElement('button');
    t.className = 'tab' + (o.id === state.activeId ? ' active' : '');
    t.innerHTML = o.name + `<span class="tab-count">${o.items.length}</span>`;
    t.addEventListener('click', () => { state.activeId = o.id; render(); });
    row.insertBefore(t, addBtn);
  });
}

function renderSection() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  const outfit = state.outfits.find(o => o.id === state.activeId);
  if (!outfit) return;

  const sec = document.createElement('div');
  sec.className = 'section active';

  // Meta
  const meta = document.createElement('div');
  meta.className = 'section-header';
  meta.innerHTML = `
    <div class="pill-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <input class="pill-input" value="${outfit.occasion}" placeholder="случай" data-field="occasion" />
    </div>
    <div class="pill-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <input class="pill-input" value="${outfit.mood}" placeholder="настроение" data-field="mood" style="width:100px" />
    </div>
    <div class="pill-input-wrap" style="cursor:pointer" id="renameBtn" title="Переименовать раздел">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span style="font-size:12px;color:var(--mist)">${outfit.name}</span>
    </div>
    ${state.outfits.length > 1 ? `<div class="pill-input-wrap" style="cursor:pointer;color:var(--accent)" id="deleteTabBtn" title="Удалить раздел">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      <span style="font-size:12px">удалить раздел</span>
    </div>` : ''}
  `;
  sec.appendChild(meta);

  meta.querySelectorAll('.pill-input').forEach(inp => {
    inp.addEventListener('input', e => {
      outfit[e.target.dataset.field] = e.target.value; save();
    });
  });
  const renameBtn = meta.querySelector('#renameBtn');
  if (renameBtn) renameBtn.addEventListener('click', () => {
    const n = prompt('Новое название:', outfit.name); if (n) { outfit.name = n.trim(); render(); }
  });
  const delTabBtn = meta.querySelector('#deleteTabBtn');
  if (delTabBtn) delTabBtn.addEventListener('click', () => {
    if (!confirm(`Удалить раздел "${outfit.name}"?`)) return;
    state.outfits = state.outfits.filter(o => o.id !== outfit.id);
    state.activeId = state.outfits[0].id;
    render();
  });

  // Grid
  const grid = document.createElement('div');
  grid.className = 'items-grid';

  if (outfit.items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.gridColumn = '1/-1';
    empty.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>
      <h3>Пока пусто</h3>
      <p>Добавь первую вещь в этот аутфит</p>
    `;
    grid.appendChild(empty);
  }

  outfit.items.forEach((item, ii) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const shopColor = SHOP_COLORS[item.shop] || '#8C8070';
    const imgHtml = item.img
      ? `<img src="${item.img}" alt="${item.name}" loading="lazy" />`
      : `<div class="card-img-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>
          <span>${(item.name||'').slice(0,12)}</span>
        </div>`;
    card.innerHTML = `
      <div class="card-img">
        ${imgHtml}
        <div class="card-overlay">
          <button class="card-overlay-btn edit-btn" title="Редактировать">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="card-overlay-btn danger del-btn" title="Удалить">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
          ${item.url ? `<button class="card-overlay-btn link-btn" title="Открыть товар">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>` : ''}
        </div>
      </div>
      <div class="card-info">
        <div class="card-name" title="${item.name}">${item.name || 'Без названия'}</div>
        ${item.shop ? `<div class="card-shop"><span class="card-shop-dot" style="background:${shopColor}"></span>${item.shop}</div>` : ''}
        ${item.price ? `<div class="card-price">${item.price}</div>` : ''}
      </div>
    `;
    card.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); openModal(outfit.id, ii); });
    card.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); outfit.items.splice(ii,1); showToast('Вещь удалена'); render(); });
    const lb = card.querySelector('.link-btn');
    if (lb) lb.addEventListener('click', e => { e.stopPropagation(); window.open(item.url,'_blank'); });
    grid.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>добавить`;
  addCard.addEventListener('click', () => openModal(outfit.id, null));
  grid.appendChild(addCard);
  sec.appendChild(grid);

  // Summary
  const prices = outfit.items.map(i => parsePriceNum(i.price)).filter(p => p > 0);
  const total = prices.reduce((a,b) => a+b, 0);
  if (prices.length > 0) {
    const bar = document.createElement('div');
    bar.className = 'summary-bar';
    bar.innerHTML = `
      <div class="summary-item"><div class="summary-label">Вещей</div><div class="summary-val">${outfit.items.length}</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-label">Итого</div><div class="summary-val">${total.toLocaleString('ru-RU')} ₽</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-label">Среднее</div><div class="summary-val">${Math.round(total/prices.length).toLocaleString('ru-RU')} ₽</div></div>
    `;
    sec.appendChild(bar);
  }

  // Bottom row
  const bottom = document.createElement('div');
  bottom.className = 'bottom-row';
  bottom.style.marginTop = '1.5rem';

  const notesWrap = document.createElement('div');
  notesWrap.innerHTML = `<div class="notes-label">Заметки</div>
    <textarea class="notes-area" placeholder="Что ищу, с чем носить, идеи для образов...">${outfit.notes}</textarea>`;
  notesWrap.querySelector('textarea').addEventListener('input', e => { outfit.notes = e.target.value; save(); });

  const paletteWrap = document.createElement('div');
  paletteWrap.className = 'palette-wrap';
  paletteWrap.innerHTML = `<div class="notes-label">Палитра аутфита</div><div class="palette-dots" id="paletteDots"></div>`;
  bottom.appendChild(notesWrap);
  bottom.appendChild(paletteWrap);
  sec.appendChild(bottom);
  container.appendChild(sec);

  const palDots = paletteWrap.querySelector('#paletteDots');
  outfit.palette.forEach((c, ci) => {
    const d = document.createElement('div');
    d.className = 'palette-dot added';
    d.style.background = c;
    d.title = 'Убрать цвет';
    d.innerHTML = `<div class="dot-remove">×</div>`;
    d.addEventListener('click', () => { outfit.palette.splice(ci,1); render(); });
    palDots.appendChild(d);
  });
  PALETTE_COLORS.filter(c => !outfit.palette.includes(c)).slice(0, Math.max(0, 12 - outfit.palette.length)).forEach(c => {
    const d = document.createElement('div');
    d.className = 'palette-dot ghost';
    d.style.background = c; d.title = 'Добавить цвет';
    d.addEventListener('click', () => { outfit.palette.push(c); render(); });
    palDots.appendChild(d);
  });
}

function parsePriceNum(s) {
  if (!s) return 0;
  const n = parseFloat(s.replace(/[^\d.,]/g,'').replace(',','.'));
  return isNaN(n) ? 0 : n;
}

// ─── MODAL ───
function openModal(outfitId, itemIdx) {
  modal = { outfitId, itemIdx, tempImg: null };
  const outfit = state.outfits.find(o => o.id === outfitId);
  const item = itemIdx !== null ? outfit.items[itemIdx] : {};
  document.getElementById('mName').value = item.name || '';
  document.getElementById('mShop').value = item.shop || '';
  document.getElementById('mUrl').value = item.url || '';
  document.getElementById('mPrice').value = item.price || '';
  document.getElementById('mImgUrl').value = '';
  resetDropZone();
  document.getElementById('modalTitle').textContent = itemIdx !== null ? 'Редактировать вещь' : 'Добавить вещь';
  document.getElementById('modalSave').textContent = itemIdx !== null ? 'Сохранить' : 'Добавить';
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('mName').focus();
}

function resetDropZone() {
  const dz = document.getElementById('dropZone');
  dz.classList.remove('has-img','over');
  dz.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Перетащи скриншот или кликни для выбора`;
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

document.getElementById('modalBg').addEventListener('click', e => { if (e.target === document.getElementById('modalBg')) closeModal(); });
document.getElementById('modalCancel').addEventListener('click', closeModal);

document.getElementById('modalSave').addEventListener('click', () => {
  const outfit = state.outfits.find(o => o.id === modal.outfitId);
  if (!outfit) return;
  const imgUrl = modal.tempImg || document.getElementById('mImgUrl').value.trim()
    || (modal.itemIdx !== null ? outfit.items[modal.itemIdx].img : '');
  const item = {
    name: document.getElementById('mName').value.trim() || 'Без названия',
    shop: document.getElementById('mShop').value,
    url: document.getElementById('mUrl').value.trim(),
    price: document.getElementById('mPrice').value.trim(),
    img: imgUrl,
  };
  if (modal.itemIdx !== null) outfit.items[modal.itemIdx] = item;
  else outfit.items.push(item);
  closeModal();
  showToast(modal.itemIdx !== null ? 'Вещь обновлена' : 'Вещь добавлена ✓');
  render();
});

// File drop
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); const f = e.dataTransfer.files[0]; if(f) readImg(f); });
fileInput.addEventListener('change', e => { if(e.target.files[0]) readImg(e.target.files[0]); });
function readImg(f) {
  const r = new FileReader();
  r.onload = e => {
    modal.tempImg = e.target.result;
    dropZone.classList.add('has-img');
    dropZone.innerHTML = `<img src="${e.target.result}" class="drop-zone-preview" alt="preview" /><span>Фото загружено ✓</span>`;
  };
  r.readAsDataURL(f);
}

// Header add
document.getElementById('addItemBtn').addEventListener('click', () => { openModal(state.activeId, null); });

// Add tab
document.getElementById('addTabBtn').addEventListener('click', () => {
  const name = prompt('Название нового раздела:');
  if (!name) return;
  const id = state.nextId++;
  state.outfits.push({ id, name: name.trim(), items: [], notes: '', palette: [], occasion: '', mood: '' });
  state.activeId = id;
  render();
});

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'garderob.json'; a.click();
  showToast('Данные экспортированы');
});

// Keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
render();
</script>
</body>
</html>
