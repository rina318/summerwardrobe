<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Мой летний гардероб</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sand:#F5F0E8;--sand2:#EDE5D4;--clay:#C9A87C;--clay2:#A8845A;
  --ink:#1C1814;--ink2:#4A4035;--mist:#8C8070;--white:#FDFAF5;
  --accent:#D4694A;--sea:#4A8FA3;--border:rgba(28,24,20,0.12);
  --border2:rgba(28,24,20,0.22);--r:8px;--font-d:'Cormorant Garamond',serif;
  --font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--sand);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-weight:300;}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:12px;padding:0 16px;height:52px;background:rgba(245,240,232,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.logo{font-family:var(--font-d);font-size:1.25rem;font-style:italic;color:var(--ink);margin-right:8px;white-space:nowrap;}
.logo span{color:var(--accent);}
.hbtn{font-family:var(--font-b);font-size:11px;font-weight:400;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;transition:all .18s;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.hbtn:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
.hbtn.accent{background:var(--accent);color:var(--white);border-color:var(--accent);}
.hbtn.accent:hover{background:#b8552f;}
.hbtn.sea{background:var(--sea);color:var(--white);border-color:var(--sea);}
.hbtn.sea:hover{background:#376d7d;}
.hsep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.board-title-input{font-family:var(--font-d);font-size:1rem;font-style:italic;border:none;background:transparent;color:var(--ink2);outline:none;min-width:120px;max-width:220px;}
.board-title-input::placeholder{color:var(--mist);}

/* ── LAYOUT ── */
.workspace{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--mist);padding:9px 4px;border:none;background:transparent;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.sidebar-body{flex:1;overflow-y:auto;padding:10px;}

/* wardrobe list */
.witem{display:flex;flex-direction:column;align-items:center;padding:8px 6px;border-radius:var(--r);cursor:grab;transition:all .18s;border:1px solid transparent;margin-bottom:6px;position:relative;background:var(--sand);}
.witem:hover{border-color:var(--clay);background:var(--sand2);}
.witem:active{cursor:grabbing;}
.witem-img{width:80px;height:106px;object-fit:cover;border-radius:6px;display:block;background:var(--sand2);}
.witem-img-placeholder{width:80px;height:106px;border-radius:6px;background:var(--sand2);display:flex;align-items:center;justify-content:center;}
.witem-img-placeholder svg{width:28px;height:28px;stroke:var(--clay);opacity:.5;}
.witem-name{font-size:11px;color:var(--ink2);margin-top:5px;text-align:center;line-height:1.3;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.witem-shop{font-size:10px;color:var(--mist);margin-top:1px;}
.witem-del,.witem-edit{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--sand2);border:1px solid var(--border);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--mist);}
.witem-del{top:4px;right:4px;}
.witem-edit{top:4px;right:26px;}
.witem:hover .witem-del,.witem:hover .witem-edit{display:flex;}
.witem-del:hover{background:var(--accent);color:var(--white);border-color:var(--accent);}
.witem-edit:hover{background:var(--sea);color:var(--white);border-color:var(--sea);}
.add-witem{width:100%;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--mist);font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;font-family:var(--font-b);}
.add-witem svg{width:14px;height:14px;stroke:var(--clay);}
.add-witem:hover{background:var(--sand2);color:var(--ink2);border-color:var(--clay);}

/* boards list */
.board-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--ink2);transition:all .15s;margin-bottom:3px;}
.board-item:hover{background:var(--sand2);}
.board-item.active{background:var(--sand2);font-weight:500;color:var(--ink);}
.board-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.board-item-count{font-size:10px;color:var(--mist);margin-left:6px;}
.board-del{font-size:14px;color:var(--mist);margin-left:6px;cursor:pointer;opacity:0;transition:opacity .15s;}
.board-item:hover .board-del{opacity:1;}
.board-del:hover{color:var(--accent);}
.add-board-btn{width:100%;margin-top:8px;padding:8px;border:1.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--mist);font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;font-family:var(--font-b);}
.add-board-btn svg{width:13px;height:13px;stroke:var(--clay);}
.add-board-btn:hover{background:var(--sand2);color:var(--ink2);border-color:var(--clay);}

/* ── CANVAS AREA ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(ellipse 70% 50% at 85% 15%,rgba(212,105,74,.07) 0%,transparent 65%),
  radial-gradient(ellipse 50% 60% at 5% 85%,rgba(74,143,163,.06) 0%,transparent 65%),
  var(--sand);}

/* grid dots */
.canvas-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(28,24,20,.12) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;}

#canvas{position:absolute;inset:0;width:100%;height:100%;}

/* canvas items */
.citem{position:absolute;cursor:grab;user-select:none;border-radius:10px;transition:box-shadow .15s;filter:drop-shadow(0 3px 10px rgba(28,24,20,.18));}
.citem:hover{filter:drop-shadow(0 6px 20px rgba(28,24,20,.28));}
.citem.dragging{cursor:grabbing;filter:drop-shadow(0 12px 32px rgba(28,24,20,.35));z-index:1000!important;}
.citem img{display:block;border-radius:10px;pointer-events:none;}
.citem.selected{outline:2px solid var(--accent);outline-offset:3px;}
.citem-controls{position:absolute;top:-32px;left:50%;transform:translateX(-50%);display:none;background:var(--ink);border-radius:20px;padding:4px 6px;gap:4px;align-items:center;white-space:nowrap;}
.citem.selected .citem-controls{display:flex;}
.citem-ctrl{width:22px;height:22px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--white);transition:background .15s;}
.citem-ctrl:hover{background:rgba(255,255,255,.2);}
.citem-ctrl svg{width:12px;height:12px;stroke:currentColor;}
.resize-handle{position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;background:var(--white);border:2px solid var(--accent);border-radius:50%;cursor:se-resize;}

/* empty canvas hint */
.canvas-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.canvas-hint svg{width:48px;height:48px;stroke:var(--clay);opacity:.3;}
.canvas-hint p{font-family:var(--font-d);font-size:1.5rem;font-style:italic;color:var(--mist);opacity:.5;}
.canvas-hint small{font-size:12px;color:var(--mist);opacity:.4;}

/* toolbar */
.canvas-toolbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(28,24,20,.85);backdrop-filter:blur(10px);border-radius:24px;padding:6px 12px;display:flex;align-items:center;gap:6px;z-index:50;}
.ctool{width:32px;height:32px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);transition:all .15s;}
.ctool:hover{background:rgba(255,255,255,.15);color:var(--white);}
.ctool.active{background:var(--accent);color:var(--white);}
.ctool svg{width:15px;height:15px;stroke:currentColor;fill:none;}
.ctool-sep{width:1px;height:20px;background:rgba(255,255,255,.15);}
.zoom-val{font-size:11px;color:rgba(255,255,255,.6);min-width:36px;text-align:center;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(28,24,20,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:1.75rem;width:min(460px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(28,24,20,.2);animation:su .22s ease;}
@keyframes su{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-family:var(--font-d);font-size:1.5rem;font-weight:400;font-style:italic;margin-bottom:1.25rem;color:var(--ink);}
.form-row{margin-bottom:.85rem;}
.flabel{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);margin-bottom:5px;}
.finput,.fselect{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--sand);color:var(--ink);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .18s;}
.finput:focus,.fselect:focus{border-color:var(--clay);}
.finput::placeholder{color:var(--mist);}
.dropz{border:1.5px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;color:var(--mist);font-size:12px;transition:all .2s;background:var(--sand);}
.dropz:hover,.dropz.over{border-color:var(--clay);background:var(--sand2);color:var(--clay2);}
.dropz svg{width:26px;height:26px;stroke:var(--clay);opacity:.6;display:block;margin:0 auto 8px;}
.dropz.has{border-color:var(--sea);background:#e8f4f8;color:var(--sea);}
.dropz-prev{width:60px;height:80px;object-fit:cover;border-radius:4px;display:block;margin:0 auto 8px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.mbtn{font-family:var(--font-b);font-size:13px;padding:9px 22px;border-radius:20px;cursor:pointer;transition:all .18s;}
.mbtn.cancel{border:1px solid var(--border2);background:transparent;color:var(--mist);}
.mbtn.cancel:hover{background:var(--sand2);color:var(--ink);}
.mbtn.save{border:none;background:var(--ink);color:var(--white);}
.mbtn.save:hover{background:var(--accent);}

/* bg removal status */
.bg-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;margin-top:8px;}
.bg-badge.on{background:#e6f4ea;color:#2a7a4a;}
.bg-badge.off{background:var(--sand2);color:var(--mist);}
.bg-badge svg{width:12px;height:12px;stroke:currentColor;}

/* toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:400;background:var(--ink);color:var(--white);padding:10px 18px;border-radius:20px;font-size:12px;transform:translateY(8px);opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="logo">летний <span>гардероб</span></div>
  <div class="hsep"></div>
  <input class="board-title-input" id="boardTitleInput" placeholder="Название мудборда..." />
  <div class="hsep"></div>
  <button class="hbtn sea" id="bgRemoveBtn">✦ Убрать фон</button>
  <button class="hbtn accent" id="addItemHeaderBtn">+ Вещь</button>
  <button class="hbtn" id="saveImgBtn">Сохранить PNG</button>
  <button class="hbtn" id="clearCanvasBtn">Очистить холст</button>
</header>

<div class="workspace">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" data-tab="wardrobe">Вещи</button>
      <button class="stab" data-tab="boards">Доски</button>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <div id="canvas">
      <div class="canvas-hint" id="canvasHint">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>
        <p>Перетащи вещи на холст</p>
        <small>или нажми «+ Вещь» чтобы добавить</small>
      </div>
    </div>
    <div class="canvas-toolbar">
      <button class="ctool" id="zoomOutBtn" title="Уменьшить"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <span class="zoom-val" id="zoomVal">100%</span>
      <button class="ctool" id="zoomInBtn" title="Увеличить"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <div class="ctool-sep"></div>
      <button class="ctool" id="deleteSelBtn" title="Удалить выбранное"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      <button class="ctool" id="bringFrontBtn" title="На передний план"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="13" height="13" rx="1"/><path d="M8 8h13v13H8z" opacity=".4"/></svg></button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">Добавить вещь</h2>
    <div class="form-row">
      <label class="flabel">Название</label>
      <input class="finput" id="mName" placeholder="Льняное платье" />
    </div>
    <div class="form-row">
      <label class="flabel">Магазин</label>
      <select class="fselect" id="mShop">
        <option value="">— выбрать —</option>
        <option>Wildberries</option><option>Ozon</option><option>Lamoda</option>
        <option>Zara</option><option>H&M</option><option>ASOS</option>
        <option>Shein</option><option>12 Storeez</option><option>Befree</option>
        <option>Love Republic</option><option>Другое</option>
      </select>
    </div>
    <div class="form-row">
      <label class="flabel">Ссылка на товар</label>
      <input class="finput" id="mUrl" placeholder="https://..." />
    </div>
    <div class="form-row">
      <label class="flabel">Цена</label>
      <input class="finput" id="mPrice" placeholder="3 490 ₽" style="width:140px" />
    </div>
    <div class="form-row">
      <label class="flabel">Фото вещи</label>
      <div class="dropz" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Перетащи скриншот или кликни
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
      <input class="finput" id="mImgUrl" placeholder="или вставь ссылку на фото..." style="margin-top:8px;" />
      <div id="bgBadge" class="bg-badge off" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="bgBadgeText">Фон будет убран при добавлении</span>
      </div>
    </div>
    <div class="mfooter">
      <button class="mbtn cancel" id="modalCancel">Отмена</button>
      <button class="mbtn save" id="modalSave">Добавить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
const SK = 'wardrobe_v3';
let state = {
  boardTitle: 'Летний гардероб',
  wardrobe: [],   // {id, name, shop, url, price, img}
  boards: [{id:1,name:'Пляжный образ',items:[]}],
  activeBoardId: 1,
  nextId: 2,
};
function loadState(){ try{ const s=JSON.parse(localStorage.getItem(SK)); if(s) state=s; }catch(e){} }
function saveState(){
  try {
    localStorage.setItem(SK, JSON.stringify(state));
  } catch(e) {
    // localStorage full (likely too many base64 images)
    toast('⚠️ Хранилище почти полное — удали пару вещей или замени фото на ссылки');
  }
}
loadState();

// ─── ACTIVE BOARD ─────────────────────────────────────────
function getBoard(){ return state.boards.find(b=>b.id===state.activeBoardId); }

// ─── CANVAS STATE ─────────────────────────────────────────
let canvasItems = [];   // DOM elements on canvas
let zoom = 1;
let selectedEl = null;
let activeSidebarTab = 'wardrobe';
let bgRemoveEnabled = false;

// ─── TOAST ───────────────────────────────────────────────
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ─── BG REMOVAL via Hugging Face RMBG-1.4 (free, no key) ────
async function removeBg(imgEl) {
  // Convert image element to blob
  const canvas = document.createElement('canvas');
  canvas.width = imgEl.naturalWidth || imgEl.width || 512;
  canvas.height = imgEl.naturalHeight || imgEl.height || 512;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(imgEl, 0, 0);
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));

  try {
    // Use Hugging Face RMBG-1.4 inference API (free, no auth needed for small usage)
    const formData = new FormData();
    formData.append('image', blob, 'image.png');

    const resp = await fetch('https://api-inference.huggingface.co/models/briaai/RMBG-1.4', {
      method: 'POST',
      headers: { 'Accept': 'image/png' },
      body: blob,
    });

    if (!resp.ok) throw new Error('HF API error: ' + resp.status);
    const resultBlob = await resp.blob();
    // Convert to base64 so it survives localStorage persistence
    return await new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.readAsDataURL(resultBlob);
    });
  } catch(e) {
    console.warn('BG removal failed, returning original:', e);
    return canvas.toDataURL('image/png');
  }
}

// ─── SIDEBAR RENDER ───────────────────────────────────────
function renderSidebar(){
  const body = document.getElementById('sidebarBody');
  if(activeSidebarTab === 'wardrobe'){
    body.innerHTML='';
    state.wardrobe.forEach((item,i)=>{
      const el=document.createElement('div');
      el.className='witem';
      el.draggable=true;
      el.dataset.wid=item.id;
      const imgHtml=item.img
        ? `<img class="witem-img" src="${item.img}" alt="${item.name}" draggable="false" />`
        : `<div class="witem-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg></div>`;
      el.innerHTML=`${imgHtml}<div class="witem-name" title="${item.name}">${item.name||'Без названия'}</div><div class="witem-shop">${item.shop||''}</div><div class="witem-del">×</div><div class="witem-edit" title="Редактировать">✎</div>`;
      el.addEventListener('dragstart', e=>{ e.dataTransfer.setData('wid', item.id); });
      el.querySelector('.witem-del').addEventListener('click', e=>{ e.stopPropagation(); state.wardrobe.splice(i,1); saveState(); renderSidebar(); });
      el.querySelector('.witem-edit').addEventListener('click', e=>{ e.stopPropagation(); openModal(item.id); });
      body.appendChild(el);
    });
    const addBtn=document.createElement('button');
    addBtn.className='add-witem';
    addBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Добавить вещь`;
    addBtn.addEventListener('click',()=>openModal(null));
    body.appendChild(addBtn);
  } else {
    body.innerHTML='';
    state.boards.forEach(board=>{
      const el=document.createElement('div');
      el.className='board-item'+(board.id===state.activeBoardId?' active':'');
      el.innerHTML=`<span class="board-item-name">${board.name}</span><span class="board-item-count">${board.items.length}</span><span class="board-del" data-bid="${board.id}">×</span>`;
      el.addEventListener('click', e=>{
        if(e.target.classList.contains('board-del')) return;
        saveCurrentBoard();
        state.activeBoardId=board.id;
        saveState();
        loadBoard();
        renderSidebar();
      });
      el.querySelector('.board-del').addEventListener('click', e=>{
        e.stopPropagation();
        if(state.boards.length<=1){toast('Нельзя удалить последнюю доску');return;}
        if(!confirm(`Удалить доску "${board.name}"?`)) return;
        state.boards=state.boards.filter(b=>b.id!==board.id);
        state.activeBoardId=state.boards[0].id;
        saveState(); loadBoard(); renderSidebar();
      });
      body.appendChild(el);
    });
    const addBtn=document.createElement('button');
    addBtn.className='add-board-btn';
    addBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Новая доска`;
    addBtn.addEventListener('click',()=>{
      const name=prompt('Название новой доски:');
      if(!name) return;
      saveCurrentBoard();
      const id=state.nextId++;
      state.boards.push({id,name:name.trim(),items:[]});
      state.activeBoardId=id;
      saveState(); loadBoard(); renderSidebar();
    });
    body.appendChild(addBtn);
  }
}

// sidebar tabs
document.querySelectorAll('.stab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));
    t.classList.add('active');
    activeSidebarTab=t.dataset.tab;
    renderSidebar();
  });
});

// ─── CANVAS ITEMS ─────────────────────────────────────────
let zCounter = 1;

function createCanvasItem(witem, x, y, w, h) {
  const wrap = document.getElementById('canvas');
  const el = document.createElement('div');
  el.className = 'citem';
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.style.width = (w||140)+'px';
  el.style.zIndex = ++zCounter;
  el.dataset.wid = witem.id;

  const img = document.createElement('img');
  img.src = witem.img || '';
  img.style.width = '100%';
  img.style.height = 'auto';
  img.draggable = false;
  if(!witem.img){ img.style.minHeight='180px'; img.style.background='var(--sand2)'; }

  const controls = document.createElement('div');
  controls.className='citem-controls';
  controls.innerHTML=`
    <button class="citem-ctrl" title="Открыть товар" data-action="link"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
    <button class="citem-ctrl" title="Удалить" data-action="del" style="color:#ff8a7a"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  `;

  const resizeH = document.createElement('div');
  resizeH.className='resize-handle';

  el.appendChild(controls);
  el.appendChild(img);
  el.appendChild(resizeH);
  wrap.appendChild(el);
  canvasItems.push(el);
  updateHint();

  // click to select
  el.addEventListener('mousedown', e=>{
    if(e.target.closest('.citem-ctrl')||e.target===resizeH) return;
    selectItem(el);
    startDragCanvas(e,el);
  });

  controls.addEventListener('click', e=>{
    const btn=e.target.closest('.citem-ctrl');
    if(!btn) return;
    if(btn.dataset.action==='del'){el.remove();canvasItems=canvasItems.filter(c=>c!==el);deselectAll();updateHint();saveCurrentBoard();}
    if(btn.dataset.action==='link'){const wi=state.wardrobe.find(w=>w.id==el.dataset.wid);if(wi?.url)window.open(wi.url,'_blank');}
  });

  // resize
  let resizing=false,rsX,rsY,rsW;
  resizeH.addEventListener('mousedown',e=>{
    e.stopPropagation(); resizing=true; rsX=e.clientX; rsW=el.offsetWidth;
    document.addEventListener('mousemove',onResize);
    document.addEventListener('mouseup',()=>{ resizing=false; document.removeEventListener('mousemove',onResize); saveCurrentBoard(); },{once:true});
  });
  function onResize(e){ if(!resizing)return; const nw=Math.max(60,rsW+(e.clientX-rsX)); el.style.width=nw+'px'; }

  return el;
}

function selectItem(el){
  deselectAll();
  el.classList.add('selected');
  selectedEl=el;
}
function deselectAll(){ document.querySelectorAll('.citem.selected').forEach(e=>e.classList.remove('selected')); selectedEl=null; }

// canvas click to deselect
document.getElementById('canvasWrap').addEventListener('mousedown',e=>{
  if(!e.target.closest('.citem')&&!e.target.closest('.canvas-toolbar')) deselectAll();
});

// drag items on canvas
function startDragCanvas(e,el){
  e.preventDefault();
  const startX=e.clientX, startY=e.clientY;
  const origL=parseInt(el.style.left)||0, origT=parseInt(el.style.top)||0;
  el.classList.add('dragging');
  el.style.zIndex=++zCounter;
  function onMove(e2){
    el.style.left=(origL+(e2.clientX-startX)/zoom)+'px';
    el.style.top=(origT+(e2.clientY-startY)/zoom)+'px';
  }
  function onUp(){ el.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); saveCurrentBoard(); }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// drop from sidebar
const cw = document.getElementById('canvasWrap');
cw.addEventListener('dragover',e=>e.preventDefault());
cw.addEventListener('drop',e=>{
  e.preventDefault();
  const wid=parseInt(e.dataTransfer.getData('wid'));
  const witem=state.wardrobe.find(w=>w.id===wid);
  if(!witem) return;
  const rect=cw.getBoundingClientRect();
  const x=(e.clientX-rect.left)/zoom-70;
  const y=(e.clientY-rect.top)/zoom-90;
  createCanvasItem(witem,x,y,140);
  saveCurrentBoard();
  toast('Вещь добавлена на холст');
});

// ─── BOARD SAVE/LOAD ──────────────────────────────────────
function saveCurrentBoard(){
  const board=getBoard();
  if(!board) return;
  board.items=canvasItems.filter(el=>document.getElementById('canvas').contains(el)).map(el=>({
    wid:parseInt(el.dataset.wid),
    x:parseInt(el.style.left)||0,
    y:parseInt(el.style.top)||0,
    w:el.offsetWidth||140,
    z:parseInt(el.style.zIndex)||1,
  }));
  saveState();
}

function loadBoard(){
  const canvas=document.getElementById('canvas');
  canvasItems.forEach(el=>{ try{el.remove();}catch(e){} });
  canvasItems=[];
  const board=getBoard();
  if(!board) return;
  board.items.forEach(bi=>{
    const witem=state.wardrobe.find(w=>w.id===bi.wid);
    if(!witem) return;
    const el=createCanvasItem(witem,bi.x,bi.y,bi.w);
    el.style.zIndex=bi.z||1;
    if(bi.z>zCounter) zCounter=bi.z;
  });
  updateHint();
  // update title
  document.getElementById('boardTitleInput').value = board.name || '';
}

function updateHint(){
  const h=document.getElementById('canvasHint');
  h.style.display=canvasItems.length>0?'none':'flex';
}

// ─── ZOOM ─────────────────────────────────────────────────
function setZoom(z){
  zoom=Math.max(.3,Math.min(2,z));
  document.getElementById('canvas').style.transform=`scale(${zoom})`;
  document.getElementById('canvas').style.transformOrigin='top left';
  document.getElementById('zoomVal').textContent=Math.round(zoom*100)+'%';
}
document.getElementById('zoomInBtn').addEventListener('click',()=>setZoom(zoom+.1));
document.getElementById('zoomOutBtn').addEventListener('click',()=>setZoom(zoom-.1));
cw.addEventListener('wheel',e=>{ e.preventDefault(); setZoom(zoom-e.deltaY*.001); },{passive:false});

// toolbar btns
document.getElementById('deleteSelBtn').addEventListener('click',()=>{
  if(!selectedEl){toast('Выбери вещь на холсте');return;}
  selectedEl.remove(); canvasItems=canvasItems.filter(c=>c!==selectedEl); deselectAll(); updateHint(); saveCurrentBoard();
});
document.getElementById('bringFrontBtn').addEventListener('click',()=>{
  if(!selectedEl){toast('Выбери вещь');return;}
  selectedEl.style.zIndex=++zCounter; saveCurrentBoard();
});

// ─── BG REMOVE TOGGLE ─────────────────────────────────────
document.getElementById('bgRemoveBtn').addEventListener('click',()=>{
  bgRemoveEnabled=!bgRemoveEnabled;
  const btn=document.getElementById('bgRemoveBtn');
  btn.style.background=bgRemoveEnabled?'#2a7a4a':'';
  btn.style.borderColor=bgRemoveEnabled?'#2a7a4a':'';
  btn.textContent=bgRemoveEnabled?'✦ Фон: Вкл':'✦ Убрать фон';
  const badge=document.getElementById('bgBadge');
  if(badge.style.display!=='none'){
    badge.className='bg-badge '+(bgRemoveEnabled?'on':'off');
    document.getElementById('bgBadgeText').textContent=bgRemoveEnabled?'Фон будет убран':'Фон сохранится';
  }
  toast(bgRemoveEnabled?'Фон будет убираться при добавлении вещей':'Убирание фона отключено');
});

// ─── SAVE AS PNG ──────────────────────────────────────────
document.getElementById('saveImgBtn').addEventListener('click',()=>{
  toast('Используй Ctrl+Shift+S или скриншот — экспорт в PNG требует CORS-прав');
});

// ─── CLEAR CANVAS ─────────────────────────────────────────
document.getElementById('clearCanvasBtn').addEventListener('click',()=>{
  if(!confirm('Очистить холст?')) return;
  canvasItems.forEach(el=>el.remove());
  canvasItems=[];
  updateHint();
  saveCurrentBoard();
  toast('Холст очищен');
});

// ─── BOARD TITLE ──────────────────────────────────────────
document.getElementById('boardTitleInput').addEventListener('input',e=>{
  const board=getBoard();
  if(board){ board.name=e.target.value; saveState(); renderSidebar(); }
});

// ─── MODAL ────────────────────────────────────────────────
let tempImg=null;
let editingItemId=null; // null = new item, number = editing existing

function openModal(itemId){
  tempImg=null;
  editingItemId=itemId||null;
  const item=itemId!=null?state.wardrobe.find(w=>w.id===itemId):null;
  document.getElementById('mName').value=item?.name||'';
  document.getElementById('mShop').value=item?.shop||'';
  document.getElementById('mUrl').value=item?.url||'';
  document.getElementById('mPrice').value=item?.price||'';
  document.getElementById('mImgUrl').value='';
  document.getElementById('modalTitle').textContent=item?'Редактировать вещь':'Добавить вещь';
  document.getElementById('modalSave').textContent=item?'Сохранить':'Добавить';
  resetDropz(item?.img);
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('mName').focus();
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===document.getElementById('modalBg')) closeModal(); });
document.getElementById('modalCancel').addEventListener('click',closeModal);
document.getElementById('addItemHeaderBtn').addEventListener('click',()=>openModal(null));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); if(e.key==='Delete'&&selectedEl&&!document.getElementById('modalBg').classList.contains('open')){ document.getElementById('deleteSelBtn').click(); } });

function resetDropz(existingImg){
  const dz=document.getElementById('dropZone');
  dz.className='dropz';
  if(existingImg){
    dz.className='dropz has';
    dz.innerHTML=`<img src="${existingImg}" class="dropz-prev" alt="preview" /><span>Текущее фото (замени если нужно)</span>`;
    tempImg=existingImg;
  } else {
    dz.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Перетащи скриншот или кликни`;
  }
  document.getElementById('bgBadge').style.display='none';
}

const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{ e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{ e.preventDefault(); dropZone.classList.remove('over'); const f=e.dataTransfer.files[0]; if(f) readImg(f); });
fileInput.addEventListener('change',e=>{ if(e.target.files[0]){ readImg(e.target.files[0]); e.target.value=''; } });

function readImg(f){
  const r=new FileReader();
  r.onload=async ev=>{
    const src=ev.target.result;
    const badge=document.getElementById('bgBadge');
    badge.style.display='inline-flex';
    badge.className='bg-badge '+(bgRemoveEnabled?'on':'off');
    document.getElementById('bgBadgeText').textContent=bgRemoveEnabled?'Фон будет убран':'Фон сохранится';
    // show preview immediately
    dropZone.className='dropz has';
    dropZone.innerHTML=`<img src="${src}" class="dropz-prev" alt="preview" /><span>${bgRemoveEnabled?'Обрабатываю фон...':'Фото загружено ✓'}</span>`;
    if(bgRemoveEnabled){
      toast('Убираю фон — подожди пару секунд...');
      const img=new Image();
      img.onload=async()=>{
        tempImg=await removeBg(img);
        dropZone.innerHTML=`<img src="${tempImg}" class="dropz-prev" alt="preview" /><span>Фон убран ✓</span>`;
        toast('Фон убран ✓');
      };
      img.onerror=()=>{ tempImg=src; dropZone.innerHTML=`<img src="${src}" class="dropz-prev" alt="preview" /><span>Фото загружено ✓</span>`; };
      img.src=src;
    } else {
      tempImg=src;
    }
  };
  r.readAsDataURL(f);
}

document.getElementById('modalSave').addEventListener('click',async()=>{
  const imgUrlField=document.getElementById('mImgUrl').value.trim();
  const name=document.getElementById('mName').value.trim()||'Без названия';
  let finalImg=tempImg||imgUrlField||'';

  // if user typed a URL (not uploaded file) and bg removal is on, try to process it
  if(imgUrlField&&!tempImg&&bgRemoveEnabled){
    try{
      const img=new Image(); img.crossOrigin='anonymous'; img.src=imgUrlField;
      await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; });
      finalImg=await removeBg(img);
    }catch(e){ finalImg=imgUrlField; }
  }

  if(editingItemId!=null){
    // edit existing
    const idx=state.wardrobe.findIndex(w=>w.id===editingItemId);
    if(idx>-1){
      state.wardrobe[idx]={...state.wardrobe[idx],name,shop:document.getElementById('mShop').value,url:document.getElementById('mUrl').value.trim(),price:document.getElementById('mPrice').value.trim(),img:finalImg};
      // update canvas items that use this witem
      document.querySelectorAll(`.citem[data-wid="${editingItemId}"] img`).forEach(i=>i.src=finalImg||'');
    }
    toast('Вещь обновлена ✓');
  } else {
    const item={id:state.nextId++,name,shop:document.getElementById('mShop').value,url:document.getElementById('mUrl').value.trim(),price:document.getElementById('mPrice').value.trim(),img:finalImg};
    state.wardrobe.push(item);
    toast('Вещь добавлена ✓');
  }
  saveState();
  closeModal();
  renderSidebar();
});

// ─── INIT ─────────────────────────────────────────────────
loadBoard();
renderSidebar();
document.getElementById('boardTitleInput').value=getBoard()?.name||'';
setZoom(1);
</script>
</body>
